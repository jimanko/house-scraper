name: Scrape listings

on:
  schedule:
    - cron: "*/30 5-22 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright
        run: pip install playwright

      - name: Cache Playwright browser
        uses: actions/cache@v4
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-v1

      - name: Install Chromium (cache miss)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: playwright install chromium --with-deps

      - name: Install Chromium system deps (cache hit)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: playwright install-deps chromium

      - name: Refresh Spitogatos cookie via browser
        env:
          # Stored secret used as fallback if the browser challenge fails
          SPITOGATOS_COOKIE_SECRET: ${{ secrets.SPITOGATOS_COOKIE }}
        run: python tools/get_spitogatos_cookie.py

      - name: Run scraper
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
          # SPITOGATOS_COOKIE is injected via GITHUB_ENV by the previous step
        run: python main.py

      - name: Commit seen.json if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen.json
          if git diff --cached --quiet; then
            echo "seen.json unchanged — nothing to commit"
          else
            git commit -m "chore: update seen.json [skip ci]"
            git push
          fi
