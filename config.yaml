# Shared filter block — referenced by all searches via YAML anchors.
# include_unknown: true means listings where floor/year_built is missing
# from the list page still pass through (we can't always scrape these fields).
x-default-filters: &default_filters
  max_price: 900
  min_size: 80
  min_bedrooms: 2
  max_bedrooms: 3
  min_year_built: 1990
  exclude_ground_floor: true
  exclude_basement: true
  include_unknown: true
  required_keywords:
    - "πάρκινγκ|parking|θέση στάθμευσης|στάθμευση"

searches:
  # ── Spitogatos — one entry per area ───────────────────────────────────────
