  # ── XE — one broad Athens search with local location_filter ───────────────
  # XE area codes (Geo.area_id_new) are ignored server-side — all return the
  # same Athens-wide results. We use location_filter locally instead.
  - name: "XE - Αθήνα (τοπικό φίλτρο περιοχών)"
    site: xe
    url: "https://www.xe.gr/property/results?transaction_name=rent&item_type=re_residence"
    filters:
      <<: *default_filters
      location_filter:
        - "Γαλάτσι"
        - "Άνω Πατήσια"
        - "Νέα Φιλαδέλφεια"
        - "Νέο Ηράκλειο"
        - "Νέα Ιωνία"
        - "Πεύκη"
        - "Χαλάνδρι"
        - "Χολαργός"
        - "Βριλήσσια"
        - "Μαρούσι"
        - "Παπάγου"
        - "Αγία Παρασκευή"
        - "Ψυχικό"

email:
  # Recipient address is set via the NOTIFICATION_EMAIL environment variable
  # (GitHub Secret). No personal email should be committed here.
  subject_prefix: "🏠 Νέα αγγελία"

# Update this date every time you refresh the SPITOGATOS_COOKIE secret.
cookie_expiry:
  spitogatos: "2026-06-23"
